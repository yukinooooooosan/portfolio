<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta
      name="description"
      content="手の届く場所に、好きなものを。ゲーム、制作ツール、SNSリンクを置いている個人サイトです。"
    >
    <title>Yukino's Folio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
      href="https://fonts.googleapis.com/css2?family=Klee+One:wght@400;600&family=Spectral:ital,wght@1,500;1,600;1,700&display=swap"
      rel="stylesheet"
    >
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="site-shell" aria-labelledby="site-title">
      <header class="site-header">
        <div class="site-header-copy">
          <h1 id="site-title">Yukino's Folio</h1>
          <p class="lead">手の届く場所に、好きなものを。</p>
        </div>
      </header>

      <section class="workbench-grid" aria-label="Yukino's Folio">
        <section class="card card-wide exhibition-card" aria-labelledby="exhibition-title">
          <div class="section-heading">
            <p class="label">Works</p>
            <h2 id="exhibition-title">展示中</h2>
            <p class="section-description">
              遊ぶ・試す入口を、このページに集めています。
            </p>
          </div>

          <div class="filter-tabs" role="group" aria-label="展示カテゴリ">
            <button class="filter-tab is-active" type="button" data-filter="all" aria-pressed="true">
              すべて
            </button>
            <button class="filter-tab" type="button" data-filter="play" aria-pressed="false">
              遊ぶ
            </button>
            <button class="filter-tab" type="button" data-filter="tool" aria-pressed="false">
              試す
            </button>
          </div>

          <div class="work-list" aria-live="polite">
            <a class="work-item card-link is-live" href="mojimoji/index.html" data-category="play">
              <span class="work-thumb work-thumb-game" aria-hidden="true"></span>
              <span class="work-kicker">Play</span>
              <span class="work-meta">
                <span class="work-title">Mojimoji</span>
                <span class="work-text">英語とキー入力で遊ぶミニゲーム</span>
              </span>
            </a>

            <a class="work-item card-link is-live" href="https://yukinooooooosan.github.io/wolffac/" data-category="play">
              <span class="work-thumb work-thumb-wolffac" aria-hidden="true"></span>
              <span class="work-kicker">Play</span>
              <span class="work-meta">
                <span class="work-title">オオカミ工場</span>
                <span class="work-text">動物たちと働き、疑い、見抜くゲーム</span>
              </span>
            </a>

            <a class="work-item card-link is-live" href="https://chara-baton.pages.dev" data-category="play">
              <span class="work-thumb work-thumb-chara-baton" aria-hidden="true"></span>
              <span class="work-kicker">Play</span>
              <span class="work-meta">
                <span class="work-title">創作キャラバトン</span>
                <span class="work-text">あなたの物語の主人公と他の物語と邂逅させるサービス</span>
              </span>
            </a>

            <a class="work-item card-link is-live" href="font-preview.html" data-category="tool">
              <span class="work-thumb work-thumb-tool" aria-hidden="true"></span>
              <span class="work-kicker">Tool</span>
              <span class="work-meta">
                <span class="work-title">Font Preview</span>
                <span class="work-text">書体を試す簡易ツール</span>
              </span>
            </a>
          </div>
        </section>

        <section class="card card-static about-card" aria-labelledby="about-title">
          <div class="about-portrait" aria-hidden="true">
            <img src="assets/profile-cutout-nohand.png" alt="">
          </div>
          <p class="label">About</p>
          <h2 id="about-title">作っている人</h2>
          <p class="card-body-text">
            ゲーム、小説、写真などを作っています。
          </p>
          <p class="card-body-text">
            構造を考えて、小さく作って、公開するのが好きです。
          </p>
        </section>

        <section class="card card-static links-card" aria-labelledby="links-title">
          <p class="label">Links</p>
          <h2 id="links-title">外部リンク</h2>
          <p class="card-body-text">いま公開しているSNSリンクです。</p>
          <nav class="link-list" aria-label="外部リンク">
            <a href="https://x.com/yukinooooooosan" target="_blank" rel="noopener noreferrer" aria-label="Xを新しいタブで開く">X</a>
          </nav>
        </section>
      </section>
    </main>
    <script src="script.js"></script>
  </body>
</html>
